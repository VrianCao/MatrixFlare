name: Prod Cost Monthly

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 1 * *'

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: prod-cost-monthly
  cancel-in-progress: false

jobs:
  local-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Governance check
        run: npm run governance:check

      - name: Runtime harness parser tests
        run: node --test tests/local/runtime-foundations/testing-harness.test.mjs

      - name: Non-local tooling tests
        run: node --test tests/local/runtime-foundations/nonlocal-tooling.test.mjs

      - name: Local regression matrix
        run: npm run test:all

  prod-cost:
    needs: local-foundation
    runs-on: ubuntu-latest
    environment: prod
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Define prod-cost paths
        id: paths
        shell: bash
        run: |
          run_timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          workspace_root="${RUNNER_TEMP}/matrix-prod-cost-${{ github.run_id }}-${{ github.run_attempt }}"
          state_root="${workspace_root}/state"
          artifact_root="${workspace_root}/artifacts"
          download_root="${workspace_root}/downloads"
          raw_artifact_name="prod-cost-raw-${run_timestamp}-${{ github.run_id }}-${{ github.run_attempt }}"
          attestation_artifact_name="prod-cost-attestation-${run_timestamp}-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "run_timestamp=${run_timestamp}" >> "$GITHUB_OUTPUT"
          echo "workspace_root=${workspace_root}" >> "$GITHUB_OUTPUT"
          echo "state_root=${state_root}" >> "$GITHUB_OUTPUT"
          echo "artifact_root=${artifact_root}" >> "$GITHUB_OUTPUT"
          echo "download_root=${download_root}" >> "$GITHUB_OUTPUT"
          echo "billing_profile=${artifact_root}/billing-profile.json" >> "$GITHUB_OUTPUT"
          echo "billing_window=${artifact_root}/billing-window.json" >> "$GITHUB_OUTPUT"
          echo "snapshot=${artifact_root}/prod-cost-snapshot.json" >> "$GITHUB_OUTPUT"
          echo "deployment_identity=${artifact_root}/prod-deployment-identity.json" >> "$GITHUB_OUTPUT"
          echo "bundle=${artifact_root}/cost-bundle.tgz" >> "$GITHUB_OUTPUT"
          echo "bundle_upload=${state_root}/bundle-upload.json" >> "$GITHUB_OUTPUT"
          echo "provenance=${state_root}/prod-cost-provenance.json" >> "$GITHUB_OUTPUT"
          echo "attestation=${state_root}/prod-cost-attestation.json" >> "$GITHUB_OUTPUT"
          echo "raw_artifact_name=${raw_artifact_name}" >> "$GITHUB_OUTPUT"
          echo "attestation_artifact_name=${attestation_artifact_name}" >> "$GITHUB_OUTPUT"
          mkdir -p "$state_root" "$artifact_root" "$download_root"
          printf '{"run_timestamp":"%s","workflow":"prod-cost-monthly"}\n' "$run_timestamp" > "${artifact_root}/raw-state-metadata.json"

      - uses: actions/checkout@v4
        id: checkout_workflow_ref

      - uses: actions/setup-node@v4
        id: setup_node
        if: steps.checkout_workflow_ref.outcome == 'success'
        with:
          node-version: '22'

      - name: Require Cloudflare credentials
        id: require_credentials
        if: steps.setup_node.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          missing=()
          for secret_name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!secret_name}" ]; then
              missing+=("$secret_name")
            fi
          done

          missing_json="$(printf '%s\n' "${missing[@]}" | node -e "const fs=require('fs');const values=fs.readFileSync(0,'utf8').split(/\n/).filter(Boolean);process.stdout.write(JSON.stringify(values));")"
          cat > "${{ steps.paths.outputs.artifact_root }}/credentials-check.json" <<EOF
          {
            "required_secrets": [
              "CLOUDFLARE_ACCOUNT_ID",
              "CLOUDFLARE_API_TOKEN"
            ],
            "missing_secrets": ${missing_json}
          }
          EOF

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing required Cloudflare credentials: ${missing[*]}" >&2
            exit 1
          fi

      - name: Resolve closed production billing window
        id: billing_window
        if: steps.require_credentials.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          result_json="${{ steps.paths.outputs.state_root }}/billing-window-result.json"
          node packages/testing/src/cli.mjs prod-cost-billing-window \
            --artifact-root "${{ steps.paths.outputs.artifact_root }}" \
            --output "${{ steps.paths.outputs.billing_window }}" \
            --profile-output "${{ steps.paths.outputs.billing_profile }}" \
            > "$result_json"
          node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(\`from_date=\${payload.from_date}\\n\`);process.stdout.write(\`to_date=\${payload.to_date}\\n\`);" "$result_json" >> "$GITHUB_OUTPUT"

      - name: Resolve latest successful prod-install baseline run
        id: install_run
        if: steps.require_credentials.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'prod-install.yml',
              status: 'completed',
              per_page: 20,
            });
            const successRun = runs.data.workflow_runs.find((run) => run.conclusion === 'success');
            if (!successRun) {
              core.setFailed('No successful prod-install workflow run found for the current repository baseline');
              return;
            }
            core.setOutput('install_run_id', String(successRun.id));
            core.setOutput('install_run_attempt', String(successRun.run_attempt));

      - name: Download prod install baseline record
        id: download_install_record
        if: steps.install_run.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.install_run.outputs.install_run_id }}
          pattern: prod-install-record-*-${{ steps.install_run.outputs.install_run_id }}-${{ steps.install_run.outputs.install_run_attempt }}
          merge-multiple: true
          path: ${{ steps.paths.outputs.download_root }}

      - name: Capture production cost snapshot
        id: capture_snapshot
        if: steps.billing_window.outcome == 'success' && steps.download_install_record.outcome == 'success'
        continue-on-error: true
        run: |
          node packages/testing/src/cli.mjs prod-cost-snapshot \
            --timestamp "${{ steps.paths.outputs.run_timestamp }}" \
            --artifact-root "${{ steps.paths.outputs.artifact_root }}" \
            --output "${{ steps.paths.outputs.snapshot }}" \
            --billing-window "${{ steps.paths.outputs.billing_window }}" \
            --install-record "${{ steps.paths.outputs.download_root }}/prod-install-record.json" \
            --captured-by "github-actions:${{ github.actor }}" \
            --reviewed-by "github-actions-run:${{ github.run_id }}"

      - name: Bundle raw prod-cost artifacts
        id: bundle_raw
        if: always() && steps.paths.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          bundle_tmp="${{ steps.paths.outputs.state_root }}/cost-bundle.tgz"
          tar -czf "$bundle_tmp" \
            -C "${{ steps.paths.outputs.artifact_root }}" \
            .
          mv "$bundle_tmp" "${{ steps.paths.outputs.bundle }}"

      - name: Upload raw prod-cost artifacts
        id: upload_raw
        if: always() && steps.paths.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.paths.outputs.raw_artifact_name }}
          path: |
            ${{ steps.paths.outputs.artifact_root }}
            ${{ steps.paths.outputs.download_root }}
          if-no-files-found: error

      - name: Upload raw prod-cost bundle to R2
        id: upload_bundle_r2
        if: always() && steps.paths.outcome == 'success'
        continue-on-error: true
        run: |
          node packages/testing/src/cli.mjs nonlocal-upload-r2 \
            --bucket "matrix-evidence-prod" \
            --key "gha/${{ github.run_id }}/${{ github.run_attempt }}/prod/${{ steps.paths.outputs.run_timestamp }}/cost-bundle.tgz" \
            --file "${{ steps.paths.outputs.bundle }}" \
            --content-type "application/gzip" \
            --output "${{ steps.paths.outputs.bundle_upload }}"

      - name: Write prod-cost provenance
        if: steps.capture_snapshot.outcome == 'success' && steps.bundle_raw.outcome == 'success' && steps.upload_bundle_r2.outcome == 'success'
        run: |
          node packages/testing/src/cli.mjs prod-cost-provenance \
            --deployment-identity "${{ steps.paths.outputs.deployment_identity }}" \
            --artifact-upload "${{ steps.paths.outputs.bundle_upload }}" \
            --output "${{ steps.paths.outputs.provenance }}"

      - name: Write prod-cost attestation
        if: steps.capture_snapshot.outcome == 'success' && steps.bundle_raw.outcome == 'success' && steps.upload_bundle_r2.outcome == 'success'
        run: |
          node packages/testing/src/cli.mjs prod-cost-attest \
            --timestamp "${{ steps.paths.outputs.run_timestamp }}" \
            --payload "${{ steps.paths.outputs.snapshot }}" \
            --provenance "${{ steps.paths.outputs.provenance }}" \
            --output "${{ steps.paths.outputs.attestation }}"

      - name: Upload prod-cost attestation artifact
        if: steps.capture_snapshot.outcome == 'success' && steps.bundle_raw.outcome == 'success' && steps.upload_bundle_r2.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.paths.outputs.attestation_artifact_name }}
          path: ${{ steps.paths.outputs.attestation }}
          if-no-files-found: error

      - name: Enforce prod-cost fail-closed outcome after raw artifact preservation
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.checkout_workflow_ref.outcome }}" != "success" ]; then
            echo "Checking out the workflow ref for prod-cost-monthly failed after raw artifacts were preserved." >&2
            exit 1
          fi
          if [ "${{ steps.setup_node.outcome }}" != "success" ]; then
            echo "Setting up Node.js for prod-cost-monthly failed after raw artifacts were preserved." >&2
            exit 1
          fi
          if [ "${{ steps.require_credentials.outcome }}" != "success" ]; then
            echo "Required Cloudflare credentials were missing after raw artifacts were preserved." >&2
            exit 1
          fi
          if [ "${{ steps.billing_window.outcome }}" != "success" ]; then
            echo "Resolving the closed production billing window failed after raw artifacts were preserved." >&2
            exit 1
          fi
          if [ "${{ steps.install_run.outcome }}" != "success" ]; then
            echo "Resolving the latest successful prod-install baseline run failed after raw artifacts were preserved." >&2
            exit 1
          fi
          if [ "${{ steps.download_install_record.outcome }}" != "success" ]; then
            echo "Downloading the prod install baseline record failed after raw artifacts were preserved." >&2
            exit 1
          fi
          if [ "${{ steps.capture_snapshot.outcome }}" != "success" ]; then
            echo "Capture production cost snapshot failed after raw artifacts were preserved." >&2
            exit 1
          fi
          if [ "${{ steps.bundle_raw.outcome }}" != "success" ]; then
            echo "Bundling raw prod-cost artifacts failed." >&2
            exit 1
          fi
          if [ "${{ steps.upload_bundle_r2.outcome }}" != "success" ]; then
            echo "Uploading raw prod-cost bundle to R2 failed." >&2
            exit 1
          fi
