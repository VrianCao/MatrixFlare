name: Promote Prod

on:
  workflow_dispatch:
    inputs:
      candidate_run_id:
        description: Release-candidate workflow run id
        required: true
        type: string
      baseline_run_id:
        description: Current prod baseline run id (prod-install or prior promote-prod)
        required: true
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: promote-prod
  cancel-in-progress: false

jobs:
  promote-prod:
    runs-on: ubuntu-latest
    environment: prod
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_OBSERVABILITY_API_TOKEN: ${{ secrets.CLOUDFLARE_OBSERVABILITY_API_TOKEN }}
      MATRIX_PROD_SECRET_SEED: ${{ secrets.MATRIX_PROD_SECRET_SEED }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Define promote paths
        id: paths
        shell: bash
        run: |
          run_timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          workspace_root=".tmp/github/promote-prod"
          state_root="${workspace_root}/state"
          download_root="${workspace_root}/downloaded"
          artifact_root="${workspace_root}/artifacts"
          record_key="gha/${{ github.run_id }}/${{ github.run_attempt }}/prod/${run_timestamp}/prod-promotion-record.json"
          artifact_name="prod-promotion-record-${run_timestamp}-${{ github.run_id }}-${{ github.run_attempt }}"
          raw_state_artifact_name="prod-promote-raw-state-${run_timestamp}-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "run_timestamp=${run_timestamp}" >> "$GITHUB_OUTPUT"
          echo "workspace_root=${workspace_root}" >> "$GITHUB_OUTPUT"
          echo "state_root=${state_root}" >> "$GITHUB_OUTPUT"
          echo "download_root=${download_root}" >> "$GITHUB_OUTPUT"
          echo "artifact_root=${artifact_root}" >> "$GITHUB_OUTPUT"
          echo "record=${artifact_root}/prod-promotion-record.json" >> "$GITHUB_OUTPUT"
          echo "record_key=${record_key}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "raw_state_artifact_name=${raw_state_artifact_name}" >> "$GITHUB_OUTPUT"
          mkdir -p "$workspace_root" "$state_root" "$download_root" "$artifact_root"
          printf '{"run_timestamp":"%s","workflow":"promote-prod"}\n' "$run_timestamp" > "${state_root}/raw-state-metadata.json"

      - name: Require production secrets
        id: require_secrets
        continue-on-error: true
        shell: bash
        run: |
          missing=()
          for secret_name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN MATRIX_PROD_SECRET_SEED; do
            if [ -z "${!secret_name}" ]; then
              missing+=("$secret_name")
            fi
          done

          missing_json="$(printf '%s\n' "${missing[@]}" | node -e "const fs=require('fs');const values=fs.readFileSync(0,'utf8').split(/\n/).filter(Boolean);process.stdout.write(JSON.stringify(values));")"
          cat > "${{ steps.paths.outputs.state_root }}/secret-check.json" <<EOF
          {
            "required_secrets": [
              "CLOUDFLARE_ACCOUNT_ID",
              "CLOUDFLARE_API_TOKEN",
              "MATRIX_PROD_SECRET_SEED"
            ],
            "missing_secrets": ${missing_json}
          }
          EOF

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing required production secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Resolve candidate and baseline runs
        id: runs
        if: steps.require_secrets.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          BASELINE_RUN_ID: ${{ inputs.baseline_run_id }}
        with:
          script: |
            const candidate = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: Number(process.env.CANDIDATE_RUN_ID),
            });
            const baseline = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: Number(process.env.BASELINE_RUN_ID),
            });
            if (candidate.data.path !== '.github/workflows/release-candidate.yml') {
              core.setFailed(`candidate_run_id must come from .github/workflows/release-candidate.yml, got ${candidate.data.path}`);
              return;
            }
            if (!['.github/workflows/prod-install.yml', '.github/workflows/promote-prod.yml'].includes(baseline.data.path)) {
              core.setFailed(`baseline_run_id must come from .github/workflows/prod-install.yml or .github/workflows/promote-prod.yml, got ${baseline.data.path}`);
              return;
            }
            core.setOutput('candidate_run_attempt', String(candidate.data.run_attempt));
            core.setOutput('baseline_run_attempt', String(baseline.data.run_attempt));
            core.setOutput('baseline_artifact_prefix', baseline.data.path === '.github/workflows/prod-install.yml' ? 'prod-install-record' : 'prod-promotion-record');
            core.setOutput('baseline_record_name', baseline.data.path === '.github/workflows/prod-install.yml' ? 'prod-install-record.json' : 'prod-promotion-record.json');

      - name: Download release candidate
        id: download_candidate
        if: steps.runs.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_run_id }}
          pattern: prod-release-candidate-*-${{ inputs.candidate_run_id }}-${{ steps.runs.outputs.candidate_run_attempt }}
          merge-multiple: true
          path: ${{ steps.paths.outputs.download_root }}/candidate

      - name: Download production baseline record
        id: download_baseline
        if: steps.runs.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.baseline_run_id }}
          pattern: ${{ steps.runs.outputs.baseline_artifact_prefix }}-*-${{ inputs.baseline_run_id }}-${{ steps.runs.outputs.baseline_run_attempt }}
          merge-multiple: true
          path: ${{ steps.paths.outputs.download_root }}/baseline

      - name: Resolve candidate commit sha
        id: candidate
        if: steps.download_candidate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          candidate_manifest="${{ steps.paths.outputs.download_root }}/candidate/prod-release-candidate.json"
          candidate_commit_sha="$(node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync(process.argv[1],'utf8'));process.stdout.write(String(data.release_commit_sha));" "$candidate_manifest")"
          echo "manifest_path=${candidate_manifest}" >> "$GITHUB_OUTPUT"
          echo "release_commit_sha=${candidate_commit_sha}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        id: checkout_candidate
        if: steps.candidate.outcome == 'success'
        continue-on-error: true
        with:
          ref: ${{ steps.candidate.outputs.release_commit_sha }}

      - name: Require candidate checkout match
        id: require_candidate_checkout_match
        if: steps.checkout_candidate.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          test "$(git rev-parse HEAD)" = "${{ steps.candidate.outputs.release_commit_sha }}"

      - name: Promote reviewed candidate into production
        id: promote_candidate
        if: steps.download_baseline.outcome == 'success' && steps.candidate.outcome == 'success' && steps.checkout_candidate.outcome == 'success' && steps.require_candidate_checkout_match.outcome == 'success'
        continue-on-error: true
        run: |
          node packages/testing/src/cli.mjs prod-promote \
            --baseline-record "${{ steps.paths.outputs.download_root }}/baseline/${{ steps.runs.outputs.baseline_record_name }}" \
            --candidate-manifest "${{ steps.candidate.outputs.manifest_path }}" \
            --working-root "${{ steps.paths.outputs.state_root }}/promote" \
            --output "${{ steps.paths.outputs.record }}" \
            --promotion-id "gha-prod-promote-${{ steps.paths.outputs.run_timestamp }}-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Upload prod-promote raw state artifact
        if: always() && steps.paths.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.paths.outputs.raw_state_artifact_name }}
          path: |
            ${{ steps.paths.outputs.state_root }}
            ${{ steps.paths.outputs.download_root }}
            ${{ steps.paths.outputs.artifact_root }}
          if-no-files-found: error

      - name: Upload promotion record artifact
        if: steps.promote_candidate.outcome == 'success'
        id: upload_record
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.paths.outputs.artifact_name }}
          path: ${{ steps.paths.outputs.record }}
          if-no-files-found: error

      - name: Upload promotion record to R2
        if: steps.promote_candidate.outcome == 'success'
        id: upload_r2
        run: |
          node packages/testing/src/cli.mjs nonlocal-upload-r2 \
            --bucket "matrix-evidence-prod" \
            --key "${{ steps.paths.outputs.record_key }}" \
            --file "${{ steps.paths.outputs.record }}" \
            --content-type "application/json; charset=utf-8" \
            --output "${{ steps.paths.outputs.state_root }}/record-upload.json"

      - name: Enforce promote-prod fail-closed outcome after raw artifact preservation
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.require_secrets.outcome }}" != "success" ]; then
            echo "Required production secrets were missing after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.runs.outcome }}" != "success" ]; then
            echo "Resolving candidate/baseline runs failed after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.download_candidate.outcome }}" != "success" ]; then
            echo "Downloading release candidate artifact failed after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.download_baseline.outcome }}" != "success" ]; then
            echo "Downloading production baseline artifact failed after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.candidate.outcome }}" != "success" ]; then
            echo "Resolving candidate commit sha failed after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.checkout_candidate.outcome }}" != "success" ]; then
            echo "Checking out candidate commit failed after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.require_candidate_checkout_match.outcome }}" != "success" ]; then
            echo "Candidate checkout/manifest match failed after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.promote_candidate.outcome }}" != "success" ]; then
            echo "Promote reviewed candidate failed after raw state preservation." >&2
            exit 1
          fi
