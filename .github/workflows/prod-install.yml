name: Prod Install

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref/tag/sha to install into production
        required: true
        type: string
      workers_subdomain:
        description: Optional account workers.dev subdomain override
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: prod-install
  cancel-in-progress: false

jobs:
  prod-install:
    runs-on: ubuntu-latest
    environment: prod
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_OBSERVABILITY_API_TOKEN: ${{ secrets.CLOUDFLARE_OBSERVABILITY_API_TOKEN }}
      MATRIX_PROD_SECRET_SEED: ${{ secrets.MATRIX_PROD_SECRET_SEED }}
    steps:
      - name: Define install paths
        id: paths
        shell: bash
        run: |
          run_timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
          workspace_root="${RUNNER_TEMP}/matrix-prod-install-${{ github.run_id }}-${{ github.run_attempt }}"
          state_root="${workspace_root}/state"
          artifact_root="${workspace_root}/artifacts"
          record_key="gha/${{ github.run_id }}/${{ github.run_attempt }}/prod/${run_timestamp}/prod-install-record.json"
          artifact_name="prod-install-record-${run_timestamp}-${{ github.run_id }}-${{ github.run_attempt }}"
          raw_state_artifact_name="prod-install-raw-state-${run_timestamp}-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "run_timestamp=${run_timestamp}" >> "$GITHUB_OUTPUT"
          echo "workspace_root=${workspace_root}" >> "$GITHUB_OUTPUT"
          echo "state_root=${state_root}" >> "$GITHUB_OUTPUT"
          echo "artifact_root=${artifact_root}" >> "$GITHUB_OUTPUT"
          echo "record=${artifact_root}/prod-install-record.json" >> "$GITHUB_OUTPUT"
          echo "record_key=${record_key}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "raw_state_artifact_name=${raw_state_artifact_name}" >> "$GITHUB_OUTPUT"
          mkdir -p "$workspace_root" "$state_root" "$artifact_root"
          printf '{"run_timestamp":"%s","workflow":"prod-install"}\n' "$run_timestamp" > "${state_root}/raw-state-metadata.json"
          cat > "${state_root}/dispatch-request.json" <<EOF
          {
            "release_ref": "${{ inputs.release_ref }}",
            "workers_subdomain": "${{ inputs.workers_subdomain }}"
          }
          EOF

      - uses: actions/checkout@v4
        id: checkout_release
        with:
          ref: ${{ inputs.release_ref }}

      - uses: actions/setup-node@v4
        id: setup_node
        if: steps.checkout_release.outcome == 'success'
        with:
          node-version: '22'

      - name: Resolve release commit sha
        id: resolve_release_commit
        if: steps.setup_node.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          release_commit_sha="$(git rev-parse HEAD)"
          echo "release_commit_sha=${release_commit_sha}" >> "$GITHUB_OUTPUT"

      - name: Require production secrets
        id: require_secrets
        if: steps.setup_node.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          missing=()
          for secret_name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN MATRIX_PROD_SECRET_SEED; do
            if [ -z "${!secret_name}" ]; then
              missing+=("$secret_name")
            fi
          done

          missing_json="$(printf '%s\n' "${missing[@]}" | node -e "const fs=require('fs');const values=fs.readFileSync(0,'utf8').split(/\n/).filter(Boolean);process.stdout.write(JSON.stringify(values));")"
          cat > "${{ steps.paths.outputs.state_root }}/secret-check.json" <<EOF
          {
            "required_secrets": [
              "CLOUDFLARE_ACCOUNT_ID",
              "CLOUDFLARE_API_TOKEN",
              "MATRIX_PROD_SECRET_SEED"
            ],
            "missing_secrets": ${missing_json}
          }
          EOF

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing required production secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Install production topology
        id: install_topology
        if: steps.require_secrets.outcome == 'success' && steps.resolve_release_commit.outcome == 'success'
        continue-on-error: true
        run: |
          args=(
            node packages/testing/src/cli.mjs prod-install
            --working-root "${{ steps.paths.outputs.state_root }}/install"
            --output "${{ steps.paths.outputs.record }}"
            --release-commit-sha "${{ steps.resolve_release_commit.outputs.release_commit_sha }}"
            --install-id "gha-prod-install-${{ steps.paths.outputs.run_timestamp }}-${{ github.run_id }}-${{ github.run_attempt }}"
          )
          if [ -n "${{ inputs.workers_subdomain }}" ]; then
            args+=(--workers-subdomain "${{ inputs.workers_subdomain }}")
          fi
          "${args[@]}"

      - name: Upload prod-install raw state artifact
        if: always() && steps.paths.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.paths.outputs.raw_state_artifact_name }}
          path: |
            ${{ steps.paths.outputs.state_root }}
            ${{ steps.paths.outputs.artifact_root }}
          if-no-files-found: error

      - name: Upload install record artifact
        if: steps.install_topology.outcome == 'success'
        id: upload_record
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.paths.outputs.artifact_name }}
          path: ${{ steps.paths.outputs.record }}
          if-no-files-found: error

      - name: Upload install record to R2
        if: steps.install_topology.outcome == 'success'
        id: upload_r2
        run: |
          node packages/testing/src/cli.mjs nonlocal-upload-r2 \
            --bucket "matrix-evidence-prod" \
            --key "${{ steps.paths.outputs.record_key }}" \
            --file "${{ steps.paths.outputs.record }}" \
            --content-type "application/json; charset=utf-8" \
            --output "${{ steps.paths.outputs.state_root }}/record-upload.json"

      - name: Enforce prod-install fail-closed outcome after raw artifact preservation
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.checkout_release.outcome }}" != "success" ]; then
            echo "Checking out the requested production release ref failed after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.setup_node.outcome }}" != "success" ]; then
            echo "Setting up Node.js for prod-install failed after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.resolve_release_commit.outcome }}" != "success" ]; then
            echo "Resolving the requested production release commit sha failed after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.require_secrets.outcome }}" != "success" ]; then
            echo "Required production secrets were missing after raw state preservation." >&2
            exit 1
          fi
          if [ "${{ steps.install_topology.outcome }}" != "success" ]; then
            echo "Install production topology failed after raw state preservation." >&2
            exit 1
          fi
